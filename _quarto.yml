project:
  type: book
  # The nav scripts are injected at runtime by assets/scripts.html, so Quarto
  # can't discover them by scanning the rendered HTML -- declare them here or
  # they never get copied into _book/.
  #
  # The webfonts are declared for the same reason: they are reached only through
  # url() references inside assets/fonts.css (generated by scripts/fetch_fonts.sh),
  # and the OFL texts must ship alongside the .woff2 files the licence covers.
  resources:
    - assets/*.js
    - assets/fonts/**

book:
  title: "DNAzyme-like Motifs, Horizontal Gene Transfer, and Short Linear Motif Conservation in Potyviridae"
  author:
    - name: "Christina Muedsam"
  date: today
  repo-url: https://github.com/MintyHybrid/project-hail-mary
  repo-actions: [edit, issue]
  chapters:
    - index.qmd
    - part: "Part I — The Discovery"
      chapters:
        - notebooks/01_discovery.qmd
        - notebooks/02_phylogenetics.qmd
    - part: "Part II — Codon Usage & Motif Architecture"
      chapters:
        - notebooks/03_codon_dnazyme.qmd
        - notebooks/04_protein_motifs.qmd
        - notebooks/05_potyvirus_motifs.qmd
    - part: "Part III — Evolutionary Mechanisms"
      chapters:
        - notebooks/06_hgt.qmd
        - notebooks/07_networks.qmd
    - part: "Part IV — Host Immunity"
      chapters:
        - notebooks/08_immu_simmu.qmd
        - notebooks/09_ap4_trafficking.qmd
    - part: "Appendix"
      chapters:
        - notebooks/A1_data_sources.qmd
        - data-code.qmd
        - about.qmd
        - references.qmd

bibliography:
  - references.bib
  - packages.bib

execute:
  freeze: auto

format:
  html:
    # Dark is the primary theme (listed first = Quarto's default); the light
    # variant is the same design language re-toned for paper. Token names are
    # identical in both files -- see the header comment in theme-dark.scss.
    theme:
      dark: theme-dark.scss
      light: theme-light.scss
    css:
      - assets/fonts.css
      - assets/hail-mary.css
    include-after-body: assets/scripts.html
    toc: true
    toc-depth: 3
    code-tools: true
    fig-cap-location: bottom
    citation-location: margin
    grid:
      sidebar-width: 250px
      body-width: 860px
      margin-width: 260px
      gutter-width: 32px
  # PDF download — deferred. TinyTeX is installed, but this book's interactive
  # widgets (visNetwork, plotly, r3dmol, DT, Observable) have no PDF form and
  # currently halt the LaTeX render even with `prefer-html: true`. Enabling PDF
  # cleanly needs per-widget static fallbacks (e.g. knitr::kable when
  # !knitr::is_html_output()) across the chapters — tracked as follow-up work.
  # pdf:
  #   documentclass: scrreport
  #   geometry: margin=1in
  #   fontsize: 11pt
  #   toc: true
  #   prefer-html: true
