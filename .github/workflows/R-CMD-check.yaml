# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# potytools lives in packages/potytools/ within a larger (Quarto book) repo,
# hence the working-directory overrides below -- GitHub Actions only
# discovers workflows under the repository-root .github/workflows/, but the
# package root for setup-r-dependencies/check-r-package is packages/potytools.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check.yaml

permissions: read-all

defaults:
  run:
    working-directory: packages/potytools

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # The repo-root .Rprofile auto-activates renv (source renv/activate.R),
      # which hijacks .libPaths() in every R session on the runner -- including
      # the pak subprocess that setup-r-dependencies spawns. renv points the
      # library at its own (empty) cache, so pak vanishes and dependency
      # resolution dies with "there is no package called 'pak'". This package
      # is checked with pak, not renv, so switch renv's autoloader off in CI;
      # local development (where renv IS wanted) is unaffected.
      RENV_CONFIG_AUTOLOADER_ENABLED: false
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: packages/potytools
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: packages/potytools
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
