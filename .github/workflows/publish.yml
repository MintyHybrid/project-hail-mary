# Deploys are manual: run `quarto publish gh-pages . --no-browser` locally,
# which renders with your own Quarto/R/renv versions (matching what you see
# in local preview) and pushes straight to gh-pages. This workflow is kept
# only as a manual fallback (Actions tab -> Run workflow), not on push, so
# CI's Quarto version can never silently diverge from what was tested.
on:
  workflow_dispatch:

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: pre-release
          tinytex: true


      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
